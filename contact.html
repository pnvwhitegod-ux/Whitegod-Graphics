    <div style="max-width:1000px; margin:80px auto; padding:0 20px;">
        <h1 style="text-align:center; margin-bottom:30px;">Get In Touch</h1>
        <p style="text-align:center; font-size:1.2rem; color:#ccc; margin-bottom:40px;">Polokwane, South Africa • Let's create something legendary</p>

        <!-- Map -->
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3679.0!2d28.123!3d-25.746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjjCsDA3JzM0LjAiUyAyOMKwMDcnMzQuMCJF!5e0!3m2!1sen!2sza!4v1740000000000" 
                width="100%" height="420" style="border:0; border-radius:12px; margin-bottom:50px;" allowfullscreen="" loading="lazy"></iframe>

        <h2 style="text-align:center; margin-bottom:30px; color:#D4AF77;">Send Us a Message</h2>
        
        <form style="background:#1a1a1a; padding:40px; border-radius:12px; border:1px solid #333; max-width:700px; margin:0 auto;">
            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Your Name</label>
            <input type="text" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Email Address</label>
            <input type="email" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Message</label>
            <textarea rows="7" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px; resize:vertical;"></textarea>

            <button type="submit" style="width:100%; margin-top:30px; padding:18px; background:#D4AF77; color:#000; border:none; border-radius:50px; font-weight:bold; font-size:1.1rem;">SEND MESSAGE</button>
        </form>
    </div>
