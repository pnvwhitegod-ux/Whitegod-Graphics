<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project | WhiteGod Graphics</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html"><strong>WHITEGOD GRAPHICS</strong></a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="enquiry.html">Start a Project</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div style="max-width:700px; margin:80px auto; padding:0 20px;">
        <h1 style="text-align:center; margin-bottom:40px;">Start Your Project</h1>
        
        <form style="background:#1a1a1a; padding:40px; border-radius:12px; border:1px solid #333;">
            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Your Name</label>
            <input type="text" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Email Address</label>
            <input type="email" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Project Type</label>
            <select required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px;">
                <option value="">Select Project Type</option>
                <option>Logo Design</option>
                <option>Full Brand Identity</option>
                <option>Web & Digital Graphics</option>
                <option>Print Materials</option>
                <option>Other</option>
            </select>

            <label style="display:block; margin:15px 0 5px; color:#D4AF77;">Project Brief</label>
            <textarea rows="7" required style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:6px; resize:vertical;"></textarea>

            <button type="submit" style="width:100%; margin-top:25px; padding:18px; background:#D4AF77; color:#000; border:none; border-radius:50px; font-weight:bold; font-size:1.1rem;">SUBMIT PROJECT BRIEF</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 WhiteGod Graphics • Polokwane, South Africa</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
